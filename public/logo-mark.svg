<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title description">
  <title id="title">OcularMP4 logo</title>
  <desc id="description">A play symbol inside a luminous eye.</desc>
  <defs>
    <linearGradient id="background" x1="72" y1="56" x2="432" y2="456" gradientUnits="userSpaceOnUse">
      <stop stop-color="#162442"/>
      <stop offset="1" stop-color="#0B1020"/>
    </linearGradient>
    <linearGradient id="eye" x1="77" y1="173" x2="435" y2="339" gradientUnits="userSpaceOnUse">
      <stop stop-color="#67E8F9"/>
      <stop offset=".5" stop-color="#5EEAD4"/>
      <stop offset="1" stop-color="#818CF8"/>
    </linearGradient>
    <linearGradient id="iris" x1="190" y1="190" x2="326" y2="326" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#6366F1"/>
    </linearGradient>
    <linearGradient id="play" x1="240" y1="216" x2="304" y2="298" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ECFEFF"/>
      <stop offset="1" stop-color="#E0E7FF"/>
