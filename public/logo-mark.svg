    </radialGradient>
  </defs>
  <rect x="20" y="20" width="472" height="472" rx="112" fill="url(#background)"/>
  <rect x="21" y="21" width="470" height="470" rx="111" fill="none" stroke="#A5B4FC" stroke-opacity=".18" stroke-width="2"/>
  <circle cx="256" cy="256" r="190" fill="url(#glow)"/>
  <path d="M75 256c42-74 106-111 181-111s139 37 181 111c-42 74-106 111-181 111S117 330 75 256Z" fill="#0D172B" stroke="url(#eye)" stroke-width="34" stroke-linejoin="round"/>
  <circle cx="256" cy="256" r="78" fill="url(#iris)"/>
  <circle cx="256" cy="256" r="54" fill="#0B1020" fill-opacity=".86"/>
  <path d="M244 218c-9-5-20 1-20 12v52c0 11 11 17 20 12l47-26c9-5 9-19 0-24l-47-26Z" fill="url(#play)"/>
  <circle cx="220" cy="212" r="10" fill="#ECFEFF" fill-opacity=".9"/>
